    <script>

        const themeBtn = document.getElementById("themeBtn");
        const cards = document.querySelectorAll(".theme-card");

        function updateTheme(){
            if(document.body.classList.contains("dark")){
                cards.forEach(card=>{
                    card.style.backgroundColor = "#1e1e1e";
                    card.style.color = "#ffffff";
                });
                
        themeBtn.textContent = "☀️";
        localStorage.setItem("theme","dark");

            }

            else{
                cards.forEach(card=>{
                    card.style.backgroundColor="#ffffff";
                         card.style.color = "#000000";
        });

        themeBtn.textContent = "🌙";
        localStorage.setItem("theme", "light");
    }
}

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
}

updateTheme();

// Toggle theme
themeBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    updateTheme();
});

// for calculating cgpa
function calculateCGPA() {

    let total = 0;
    let count = 0;

    for (let i = 1; i <= 6; i++) {

        let input = document.getElementById("sem" + i);

        if (input.value !== "") {

            let gpa = parseFloat(input.value);

            if (gpa < 0 || gpa > 10) {
                alert("Enter GPA between 0 and 10");
                return;
            }

            total += gpa;
            count++;
        }
    }

    if (count === 0) {
        alert("Enter at least one GPA");
        return;
    }

    let cgpa = total / count;
    let percentage = cgpa * 9.5;

    document.getElementById("result").textContent = cgpa.toFixed(2);
    document.getElementById("percentage").textContent = percentage.toFixed(2) + "%";
}    </script>
