            <script>
            const themeBtn2 = document.getElementById("themeBtn2");

            // Saved theme load
            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                document.body.classList.add("dark");
                themeBtn2.textContent = "☀️ ";
            }

            // Toggle theme
            themeBtn2.addEventListener("click", () => {
                document.body.classList.toggle("dark");

                if (document.body.classList.contains("dark")) {
                    localStorage.setItem("theme", "dark");
                    themeBtn2.textContent = "☀️ ";
                } else {
                    localStorage.setItem("theme", "light");
                    themeBtn2.textContent = "🌙 ";
                }
            });

        <script>

        // toast button add note
         document.getElementById("addBtn").onclick = function() {
        var toastElList = [].slice.call(document.querySelectorAll('.toast'))
        var toastList = toastElList.map(function(toastEl) {
          return new bootstrap.Toast(toastEl)
        })
        toastList.forEach(toast => toast.show()) 
      }
        
        

           // Input Fields
const noteTitle = document.getElementById("noteTitle");
const noteSubject = document.getElementById("noteSubject");
const noteContent = document.getElementById("noteContent");

// Buttons
const addBtn = document.getElementById("addBtn");
const clearBtn = document.getElementById("clearBtn");

// Notes Container
const notesContainer = document.getElementById("notesContainer");

// Add Note
addBtn.addEventListener("click", function () {

    const title = noteTitle.value.trim();
    const subject = noteSubject.value;
    const content = noteContent.value.trim();

    if (title === "" || subject === "" || content === "") {
        alert("Please fill all fields!");
        return;
    }

    // Create Card
    const card = document.createElement("div");
    card.className = "col-md-6 col-lg-5 mt-3";

    card.innerHTML = `
        <div class="card shadow h-100 theme-card">
            <div class="card-body">

                <h2 class="ms-2">${title}</h2>

                <span class="badge bg-success ms-2 mb-3">
                    ${subject}
                </span>

                <p class="ms-2">${content}</p>

                <button class="btn btn-danger ms-3 mt-1 deleteBtn">
                    Delete
                </button>

            </div>
        </div>
    `;

    // Add card to container
    notesContainer.prepend(card);

    // Delete Note
    card.querySelector(".deleteBtn").addEventListener("click", function () {
        card.remove();
    });

    // Clear Inputs
    noteTitle.value = "";
    noteSubject.selectedIndex = 0;
    noteContent.value = "";
});

// Clear Button
clearBtn.addEventListener("click", function () {
    noteTitle.value = "";
    noteSubject.selectedIndex = 0;
    noteContent.value = "";
});

        </script>
