                                  <script>

                                   

                function calculateAttendence(){
                    let total=

                    document.getElementById("total").value;

                    let attended =
                    document.getElementById("attended").value;

                      if (total <= 0) {
        alert("Total Classes Should Be More Than 0 ");
        return;
    }   

    


                    let percentage = 
                    (attended/total) *100;
                    
                    document.getElementById("result")
                    .innerHTML = 
                    percentage.toFixed(2) + "%";

                    document.getElementById("progressBar")
                    .style.width = percentage + "%";

                    document.getElementById("progressBar")
                    .innerHTML = percentage.toFixed(0) + "%";

                        // Color change
    progressBar.classList.remove("bg-success", "bg-warning", "bg-danger");

    if (percentage >= 75) {
        progressBar.classList.add("bg-success"); // Green
    }
    else if (percentage >= 50) {
        progressBar.classList.add("bg-warning"); // Yellow
    }
    else {
        progressBar.classList.add("bg-danger"); // Red
    }

                    // h1 heading id console

                    let message = document.getElementById("message");

if (percentage >= 75) {
    message.innerHTML = "Great Keep It Up 🎉";
}
else if (percentage >= 50) {
    message.innerHTML = "Need Some Improvement 🙂";
}
else {
    message.innerHTML = "Lowest Attendence ⚠️";
}


                }
